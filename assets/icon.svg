<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a2d42"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0a030"/>
      <stop offset="100%" stop-color="#d4831e"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Outer ping arc -->
  <path d="M155 155 A143 143 0 0 1 357 155" fill="none" stroke="#f0a030" stroke-width="22" stroke-linecap="round" opacity="0.3"/>
  <path d="M357 357 A143 143 0 0 1 155 357" fill="none" stroke="#f0a030" stroke-width="22" stroke-linecap="round" opacity="0.3"/>

  <!-- Middle ping arc -->
  <path d="M190 190 A93 93 0 0 1 322 190" fill="none" stroke="#f0a030" stroke-width="24" stroke-linecap="round" opacity="0.55"/>
  <path d="M322 322 A93 93 0 0 1 190 322" fill="none" stroke="#f0a030" stroke-width="24" stroke-linecap="round" opacity="0.55"/>

  <!-- Inner ping arc -->
  <path d="M218 218 A54 54 0 0 1 294 218" fill="none" stroke="#f0a030" stroke-width="26" stroke-linecap="round" opacity="0.8"/>
  <path d="M294 294 A54 54 0 0 1 218 294" fill="none" stroke="#f0a030" stroke-width="26" stroke-linecap="round" opacity="0.8"/>

  <!-- Center beacon dot -->
  <circle cx="256" cy="256" r="28" fill="url(#glow)"/>
  <circle cx="256" cy="256" r="16" fill="#fff5e0" opacity="0.9"/>
</svg>
